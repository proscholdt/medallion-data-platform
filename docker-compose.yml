version: "3.9"

services:
  # ─────────────────────────────────────────────
  # API — FastAPI endpoints (Pipedrive, Facebook)
  # ─────────────────────────────────────────────
  api:
    build: .
    container_name: bi-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./datamart:/app/datamart
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # ETL — Orchestrator geral (Bronze → Silver → Gold)
  # ─────────────────────────────────────────────
  etl:
    build: .
    container_name: bi-etl
    env_file:
      - .env
    volumes:
      - ./datamart:/app/datamart
    command: >
      python datamart/1_Orchestrator_Gerneral/Orchestartor_General.py
    profiles:
      - etl
